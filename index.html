<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moskva Metro Sxemasi - Real Vaqtda GPS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111; /* Metro sxemasi qorong'i fonda chiroyli ko'rinadi */
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* GPS Status paneli */
        .status-panel {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(30, 30, 30, 0.9);
            color: #ffffff;
            padding: 12px 18px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            width: 85%;
            max-width: 380px;
            font-size: 13px;
            border: 1px solid #333;
        }

        .status-title {
            font-weight: bold;
            color: #ff9800;
            margin-bottom: 3px;
            font-size: 14px;
        }

        .coords {
            font-family: monospace;
            color: #aaa;
            font-size: 11px;
        }

        .controls {
            position: absolute;
            bottom: 25px;
            right: 20px;
            z-index: 1000;
        }

        .btn {
            background: #ff9800;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="status-panel">
        <div class="status-title" id="status-text">Metro GPS tizimi yuklanmoqda...</div>
        <div class="coords" id="gps-coords">Kenglik: -- | Uzunlik: --</div>
        <div id="accuracy" style="font-size: 11px; color: #bbb; margin-top: 2px;">Aniqlik: --</div>
    </div>

    <div class="controls">
        <button class="btn" id="locate-btn" title="Mening joylashuvim">🎯</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Moskva markazi koordinatalari
        const moscowCenter = [55.7522, 37.6156];
        
        // Xaritani yaratish
        const map = L.map('map', {
            zoomControl: false,
            minZoom: 10,
            maxZoom: 15
        }).setView(moscowCenter, 11);

        // MUHIM: Oddiy xarita o'rniga Moskva Metro Sxemasi qatlamini qo'shish (Thunderforest / OpenCycleMap transport qatlami)
        // Bu qatlam aynan metro liniyalari va bekatlariga urg'u beradi
        L.tileLayer('https://{s}.tile.thunderforest.com/transport/{z}/{x}/{y}.png?apikey=a5dd1a44c07d4ff38cf0ef216503c80a', {
            attribution: '© OpenStreetMap & Thunderforest',
            maxZoom: 15
        }).addTo(map);

        let userMarker = null;
        let accuracyCircle = null;
        let isFirstLoad = true;

        // GPS'ni yuqori aniqlikda kuzatish
        if ("geolocation" in navigator) {
            const geoOptions = {
                enableHighAccuracy: true, 
                timeout: 15000,           
                maximumAge: 0             
            };

            navigator.geolocation.watchPosition(successLocation, errorLocation, geoOptions);
        } else {
            document.getElementById('status-text').innerText = "Brauzerda GPS qo'llab-quvvatlanmaydi.";
        }

        function successLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy;

            document.getElementById('gps-coords').innerText = `Kenglik: ${lat.toFixed(5)} | Uzunlik: ${lng.toFixed(5)}`;
            document.getElementById('accuracy').innerText = `Xatolik: ${accuracy.toFixed(1)} metr`;
            document.getElementById('status-text').innerText = "Metroda harakat kuzatilmoqda";
            document.getElementById('status-text').style.color = "#4caf50";

            // Metro sxemasidagi foydalanuvchi belgisi (Yorqin qizil/olovrang nuqta)
            if (!userMarker) {
                userMarker = L.circleMarker([lat, lng], {
                    radius: 10,
                    color: '#ffffff',
                    weight: 3,
                    fillColor: '#ff1744',
                    fillOpacity: 1
                }).addTo(map).bindPopup("Siz shu yerdasiz").openPopup();

                accuracyCircle = L.circle([lat, lng], {
                    radius: accuracy,
                    color: '#ff1744',
                    weight: 1,
                    fillColor: '#ff1744',
                    fillOpacity: 0.15
                }).addTo(map);

            } else {
                userMarker.setLatLng([lat, lng]);
                accuracyCircle.setLatLng([lat, lng]);
                accuracyCircle.setRadius(accuracy);
            }

            if (isFirstLoad) {
                map.setView([lat, lng], 13); // Metro bekatlari aniq ko'rinishi uchun yaqinlashtiramiz
                isFirstLoad = false;
            }
        }

        function errorLocation(error) {
            let errorMsg = "GPS aniqlanmadi.";
            if(error.code === error.PERMISSION_DENIED) {
                errorMsg = "GPS ruxsatnomasi o'chiq!";
            }
            document.getElementById('status-text').innerText = errorMsg;
            document.getElementById('status-text').style.color = "#ff1744";
        }

        document.getElementById('locate-btn').addEventListener('click', () => {
            if (userMarker) {
                map.setView(userMarker.getLatLng(), 14);
            } else {
                alert("GPS aniqlanmoqda, kuting...");
            }
        });
    </script>
</body>
</html>
