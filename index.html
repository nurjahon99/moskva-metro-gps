<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moskva Metrosi - Real Vaqtda GPS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Panellar */
        .status-panel {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
            font-size: 14px;
        }

        .status-title {
            font-weight: bold;
            color: #d32f2f;
            margin-bottom: 4px;
        }

        .coords {
            font-family: monospace;
            color: #555;
            font-size: 12px;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background: #ffffff;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.3s;
        }

        .btn:active {
            background: #e0e0e0;
        }

        /* Metropoliten liniyalari va bekatlar uchun sodda stil (Moslashtirish uchun) */
        .metro-popup {
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="status-panel">
        <div class="status-title" id="status-text">GPS signal qidirilmoqda...</div>
        <div class="coords" id="gps-coords">Kenglik: -- | Uzunlik: --</div>
        <div id="accuracy" style="font-size: 11px; color: #77h; margin-top: 2px;">Aniqlik darajasi: --</div>
    </div>

    <div class="controls">
        <button class="btn" id="locate-btn" title="Mening joylashuvim">🎯</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Moskva markazi koordinatalari (Xarita boshlang'ich holati)
        const moscowCenter = [55.7558, 37.6173];
        
        // Xaritani yaratish
        const map = L.map('map', {
            zoomControl: false // Mobil qurilmalar uchun qulaylik maqsadida standart tugmalarni ochirish
        }).setView(moscowCenter, 13);

        // Ochiq xarita qatlamini qo'shish (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Standart masshtab tugmalarini pastga chap burchakka joylashtirish
        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        let userMarker = null;
        let accuracyCircle = null;
        let isFirstLoad = true;

        // GPS ma'lumotlarini kuzatish funksiyasi (Juda aniq rejimda)
        if ("geolocation" in navigator) {
            const geoOptions = {
                enableHighAccuracy: true, // GEOLOCATION'NI ENG YUQORI ANIQLIKDA ISHLATISH (GPS elementini yoqadi)
                timeout: 10000,           // Signal kutish vaqti: 10 soniya
                maximumAge: 0             // Keshlangan ma'lumotdan foydalanmaslik, har doim yangi koordinata olish
            };

            // watchPosition real vaqt rejimida harakatni kuzatib boradi
            navigator.geolocation.watchPosition(successLocation, errorLocation, geoOptions);
        } else {
            document.getElementById('status-text').innerText = "Brauzeringizda GPS xizmati mavjud emas.";
        }

        // Lokatsiya muvaffaqiyatli aniqlanganda ishlaydigan funksiya
        function successLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy; // Metrdagi aniqlik xatoligi

            document.getElementById('gps-coords').innerText = `Kenglik: ${lat.toFixed(5)} | Uzunlik: ${lng.toFixed(5)}`;
            document.getElementById('accuracy').innerText = `Aniqlik xatoligi: ${accuracy.toFixed(1)} metr`;
            document.getElementById('status-text').innerText = "Harakat kuzatilmoqda...";
            document.getElementById('status-text').style.color = "#2e7d32";

            // Agar foydalanuvchi belgisi oldin yaratilmagan bo'lsa, yangi yaratish
            if (!userMarker) {
                // Foydalanuvchi nuqtasi (ko'k rangli marker)
                userMarker = L.circleMarker([lat, lng], {
                    radius: 9,
                    color: '#fff',
                    weight: 3,
                    fillColor: '#007bff',
                    fillOpacity: 1
                }).addTo(map).bindPopup("Siz shu yerdasiz").openPopup();

                // Aniqlik doirasi
                accuracyCircle = L.circle([lat, lng], {
                    radius: accuracy,
                    color: '#007bff',
                    weight: 1,
                    fillColor: '#007bff',
                    fillOpacity: 0.15
                }).addTo(map);

            } else {
                // Agar marker mavjud bo'lsa, faqat uning koordinatasini yangilash
                userMarker.setLatLng([lat, lng]);
                accuracyCircle.setLatLng([lat, lng]);
                accuracyCircle.setRadius(accuracy);
            }

            // Dastur birinchi marta ochilganda xaritani avtomatik foydalanuvchiga qaratish
            if (isFirstLoad) {
                map.setView([lat, lng], 16);
                isFirstLoad = false;
            }
        }

        // GPS xatolik yuz berganda
        function errorLocation(error) {
            let errorMsg = "GPS aniqlashda xatolik.";
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    errorMsg = "GPS'ga ruxsat berilmadi! Iltimos, brauzerda geolokatsiyani yoqing.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    errorMsg = "Joylashuv ma'lumotlari mavjud emas (Signal past).";
                    break;
                case error.TIMEOUT:
                    errorMsg = "GPS signal kutish vaqti tugadi.";
                    break;
            }
            document.getElementById('status-text').innerText = errorMsg;
            document.getElementById('status-text').style.color = "#d32f2f";
        }

        // "Mening joylashuvim" tugmasi bosilganda xaritani markazlashtirish
        document.getElementById('locate-btn').addEventListener('click', () => {
            if (userMarker) {
                map.setView(userMarker.getLatLng(), 17);
            } else {
                alert("GPS koordinatalari hali olinmadi. Iltimos, biroz kuting...");
            }
        });
    </script>
</body>
</html>
